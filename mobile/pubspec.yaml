name: kulfi_ice_inventrack
description: Kulfi ICE InvenTrack - Inventory & Sales Tracking App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  provider: ^6.1.2
  file_picker: ^11.0.2
  flutter_svg: ^2.0.10+1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo_splash.svg
    - assets/images/logo_login.svg
    - assets/images/logo_sidebar.svg
    - assets/images/logo_light_theme.svg
    - assets/images/logo_dark_theme.svg
    - assets/images/logo_icon.svg
